<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CodeLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0e16;--panel:#13131f;--surface:#1a1a2e;--surface2:#1f1f38;
  --border:#252542;--border2:#2e2e52;
  --accent:#5865f2;--accent-dim:#5865f222;
  --green:#23d18b;--red:#f14c4c;--yellow:#e5c07b;
  --blue:#61afef;--purple:#c678dd;--cyan:#4fc1ff;
  --text:#abb2bf;--bright:#e6e6ef;--muted:#4a4a6a;
  --topbar-h:48px;--bottombar-h:26px;--tab-h:36px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"JetBrains Mono",monospace;}

/* TOPBAR */
#topbar{
  height:var(--topbar-h);background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;z-index:100;position:relative;
}
.logo{font-family:"Syne",sans-serif;font-weight:800;font-size:17px;
  background:linear-gradient(135deg,#5865f2,#eb459e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.sp{flex:1}
#lang-pill{
  display:flex;align-items:center;gap:5px;background:var(--surface);
  border:1px solid var(--border2);border-radius:7px;padding:5px 10px;
  cursor:pointer;font-size:12px;color:var(--bright);flex-shrink:0;
  border:none;font-family:"JetBrains Mono",monospace;
}
#lang-pill:active{background:var(--surface2)}
.arrow{color:var(--muted);font-size:10px}
#btn-run{
  display:flex;align-items:center;gap:6px;background:var(--green);color:#071a0f;
  border:none;border-radius:8px;padding:7px 14px;
  font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;
  cursor:pointer;flex-shrink:0;transition:filter .15s;
}
#btn-run:active{filter:brightness(.85);transform:scale(.97)}
#btn-run.running{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.icon-btn{
  width:34px;height:34px;border-radius:7px;background:var(--surface);
  border:1px solid var(--border2);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;transition:all .12s;
  -webkit-appearance:none;
}
.icon-btn:active{background:var(--surface2);transform:scale(.93)}

/* APP LAYOUT */
#app{
  display:flex;
  height:calc(100dvh - var(--topbar-h) - var(--bottombar-h));
  overflow:hidden;position:relative;
}

/* SIDEBAR OVERLAY */
#sidebar-overlay{display:none;position:absolute;inset:0;background:#00000066;z-index:80;backdrop-filter:blur(2px);}
#sidebar-overlay.open{display:block}

/* SIDEBAR */
#sidebar{
  width:240px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:90;
}
@media(max-width:700px){
  #sidebar{position:absolute;top:0;bottom:0;left:0;transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:6px 0 24px #00000077;}
  #sidebar.open{transform:translateX(0)}
}
.sb-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.search-box{width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:7px;padding:6px 10px;color:var(--bright);
  font-family:"JetBrains Mono",monospace;font-size:12px;outline:none;}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
#file-tree{flex:1;overflow-y:auto;padding:4px 0}
.tree-lbl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:10px 14px 4px}
.tree-item{
  display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;
  background:none;border:none;color:var(--text);
  font-family:"JetBrains Mono",monospace;font-size:12px;cursor:pointer;text-align:left;
  border-left:2px solid transparent;transition:all .1s;
}
.tree-item:active{background:var(--surface2)}
.tree-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.tree-item.modified .iname::after{content:" ●";color:var(--yellow);font-size:9px}
.item-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.sb-foot{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.side-btn{
  flex:1;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);border-radius:7px;padding:7px 4px;
  font-family:"JetBrains Mono",monospace;font-size:11px;cursor:pointer;transition:all .12s;
}
.side-btn:active{background:var(--surface2)}

/* EDITOR */
#editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#tabs{
  height:var(--tab-h);background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;overflow-x:auto;flex-shrink:0;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:5px;padding:0 11px;height:100%;
  background:transparent;border:none;color:var(--muted);
  font-family:"JetBrains Mono",monospace;font-size:12px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;border-right:1px solid var(--border);
  border-top:2px solid transparent;transition:color .1s;
}
.tab:active{background:var(--surface)}
.tab.active{color:var(--bright);background:var(--bg);border-top-color:var(--accent)}
.tab-close{
  width:16px;height:16px;border-radius:3px;background:none;border:none;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;
}
.tab-close:active{background:var(--red)33;color:var(--red)}
.tab-add{
  padding:0 12px;height:100%;background:none;border:none;
  color:var(--muted);font-size:20px;cursor:pointer;flex-shrink:0;
}
#monaco-wrap{flex:1;position:relative;overflow:hidden}
#monaco-container{width:100%;height:100%}
.editor-empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--muted);
  background:var(--bg);pointer-events:none;gap:10px;
}
.editor-empty .e-icon{font-size:40px;opacity:.3}
.editor-empty p{font-size:12px;opacity:.4}

/* RESIZE HANDLE */
#resize-handle{
  width:4px;background:var(--border);cursor:col-resize;
  transition:background .15s;flex-shrink:0;
}
#resize-handle:hover,#resize-handle.dragging{background:var(--accent)}
@media(max-width:700px){#resize-handle{display:none}}

/* OUTPUT PANEL */
#output-panel{
  width:320px;flex-shrink:0;display:flex;flex-direction:column;
  border-left:1px solid var(--border);background:var(--panel);overflow:hidden;
}
#output-panel.d-hidden{width:0!important;border-left:none}
@media(max-width:700px){
  #output-panel{
    position:absolute;bottom:0;left:0;right:0;width:100%!important;
    height:0;border-left:none;border-top:1px solid var(--border);
    transition:height .3s cubic-bezier(.4,0,.2,1);z-index:50;
  }
  #output-panel.m-open{height:44vh}
  #output-panel.d-hidden{width:100%!important;height:0}
}
.drawer-handle{
  display:none;height:18px;align-items:center;justify-content:center;
  cursor:ns-resize;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.drawer-handle::after{content:'';width:32px;height:4px;background:var(--border2);border-radius:2px;}
@media(max-width:700px){.drawer-handle{display:flex}}
.op-header{
  display:flex;align-items:center;gap:4px;background:var(--surface);
  border-bottom:1px solid var(--border);height:34px;padding:0 10px;flex-shrink:0;
}
.op-tab{
  padding:3px 10px;border-radius:5px;font-size:11px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-family:"JetBrains Mono",monospace;
}
.op-tab.active{background:var(--bg);color:var(--bright)}
.op-clear{
  margin-left:auto;background:none;border:1px solid var(--border2);
  color:var(--muted);border-radius:5px;padding:2px 8px;font-size:10px;
  cursor:pointer;font-family:"JetBrains Mono",monospace;
}
.op-clear:active{border-color:var(--red);color:var(--red)}
#output-scroll{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.log-line{display:flex;gap:8px;padding:2px 0;animation:logIn .15s ease}
@keyframes logIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.log-time{color:var(--muted);flex-shrink:0;font-size:10px;padding-top:2px}
.log-msg{word-break:break-all;white-space:pre-wrap;font-size:12px;line-height:1.65}
.log-stdout{color:var(--bright)}.log-stderr{color:var(--red)}.log-info{color:var(--cyan)}
.log-success{color:var(--green)}.log-warn{color:var(--yellow)}.log-system{color:var(--purple)}
#stdin-section,#args-section{
  display:none;flex-direction:column;padding:10px 12px;gap:6px;
  border-top:1px solid var(--border);flex-shrink:0;
}
#stdin-section.active,#args-section.active{display:flex}
.input-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
#stdin-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--bright);border-radius:7px;padding:7px 10px;
  font-family:"JetBrains Mono",monospace;font-size:12px;
  resize:none;outline:none;height:68px;
}
#stdin-input:focus,#args-input:focus{border-color:var(--accent)}
#args-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--bright);border-radius:7px;padding:7px 10px;
  font-family:"JetBrains Mono",monospace;font-size:12px;outline:none;
}
#stdin-input::placeholder,#args-input::placeholder{color:var(--muted)}

/* BOTTOM BAR */
#bottombar{
  height:var(--bottombar-h);background:var(--accent);display:flex;align-items:center;
  padding:0 12px;font-size:11px;color:rgba(255,255,255,.75);gap:10px;flex-shrink:0;
}
.bb-sep{opacity:.3}
.bb-right{margin-left:auto;display:flex;gap:10px}

/* MODALS */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:200;background:#00000077;
  backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;
}
.modal-bg.open{display:flex}
@media(min-width:701px){.modal-bg{align-items:center}}
.modal-sheet{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:16px 16px 0 0;width:100%;max-width:500px;
  padding:14px 0 28px;animation:slideUp .2s ease;
  max-height:80vh;overflow:hidden;display:flex;flex-direction:column;
}
@media(min-width:701px){.modal-sheet{border-radius:13px;width:360px;animation:popIn .18s ease}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.sheet-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 12px}
@media(min-width:701px){.sheet-handle{display:none}}
.sheet-title{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;
  color:var(--bright);padding:0 16px 10px;border-bottom:1px solid var(--border)}
.lang-list{overflow-y:auto;flex:1;padding:6px 0}
.lang-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  cursor:pointer;background:none;border:none;width:100%;text-align:left;
  font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--text);
}
.lang-item:active{background:var(--surface)}
.lang-item.selected{color:var(--accent);background:var(--accent-dim)}
.lang-item .lv{font-size:10px;color:var(--muted);margin-left:auto}
.lang-item .ck{color:var(--accent)}
.nf-sheet{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:16px 16px 0 0;width:100%;max-width:500px;
  padding:20px 16px 32px;animation:slideUp .2s ease;
}
@media(min-width:701px){.nf-sheet{border-radius:13px;width:340px;animation:popIn .18s ease}}
.nf-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;color:var(--bright);margin-bottom:13px}
.nf-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--bright);border-radius:9px;padding:10px 13px;
  font-family:"JetBrains Mono",monospace;font-size:14px;outline:none;margin-bottom:13px;
}
.nf-input:focus{border-color:var(--accent)}
.nf-btns{display:flex;gap:8px}
.nf-btn{flex:1;padding:10px;border-radius:9px;font-family:"JetBrains Mono",monospace;
  font-size:13px;cursor:pointer;border:none;font-weight:600;}
.nf-btn.ok{background:var(--accent);color:#fff}
.nf-btn.ok:active{filter:brightness(.9)}
.nf-btn.cancel{background:var(--surface);color:var(--text);border:1px solid var(--border2)}

/* TOAST */
.toast{
  position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-6px);
  background:var(--surface);border:1px solid var(--border2);border-top:2px solid var(--accent);
  color:var(--bright);padding:8px 16px;border-radius:9px;font-size:12px;
  z-index:999;opacity:0;pointer-events:none;transition:all .2s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#file-input{display:none}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">CodeLab</span>
  <button class="icon-btn" onclick="toggleSidebar()">☰</button>
  <button id="lang-pill" onclick="openLangModal()">
    <span id="lang-label">⚡ JS</span>
    <span class="arrow">▾</span>
  </button>
  <div class="sp"></div>
  <button id="btn-run" onclick="runCode()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6V2z"/></svg>
    Run
  </button>
  <button class="icon-btn" onclick="toggleOutput()" title="Output">⊞</button>
</div>

<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div id="sidebar">
    <div class="sb-head">
      <div class="sb-title">Explorer</div>
      <input class="search-box" type="text" placeholder="🔍 ค้นหา..." oninput="filterTree(this.value)">
    </div>
    <div id="file-tree"></div>
    <div class="sb-foot">
      <button class="side-btn" onclick="newFileModal()">＋ New</button>
      <button class="side-btn" onclick="document.getElementById('file-input').click()">📂 Open</button>
      <button class="side-btn" onclick="downloadActive()">⬇ Save</button>
    </div>
  </div>

  <div id="editor-panel">
    <div id="tabs"><button class="tab-add" onclick="newFileModal()">+</button></div>
    <div id="monaco-wrap">
      <div class="editor-empty" id="editor-empty">
        <div class="e-icon">💻</div>
        <p>เปิดหรือสร้างไฟล์ใหม่</p>
      </div>
      <div id="monaco-container"></div>
    </div>
  </div>

  <div id="resize-handle" onmousedown="startResize(event)"></div>

  <div id="output-panel">
    <div class="drawer-handle" id="drawer-handle"></div>
    <div class="op-header">
      <button class="op-tab active" onclick="switchOpTab(this,'output')">Output</button>
      <button class="op-tab" onclick="switchOpTab(this,'stdin')">Stdin</button>
      <button class="op-tab" onclick="switchOpTab(this,'args')">Args</button>
      <button class="op-clear" onclick="clearLog()">✕ Clear</button>
    </div>
    <div id="output-scroll"></div>
    <div id="stdin-section">
      <div class="input-lbl">Standard Input</div>
      <textarea id="stdin-input" placeholder="ใส่ input สำหรับโปรแกรม..."></textarea>
    </div>
    <div id="args-section">
      <div class="input-lbl">Arguments</div>
      <input id="args-input" type="text" placeholder="arg1 arg2 --flag">
    </div>
  </div>
</div>

<div id="bottombar">
  <span id="bb-lang">⚡ JavaScript</span>
  <span class="bb-sep">|</span>
  <span id="bb-file">No file</span>
  <div class="bb-right">
    <span id="bb-cursor">Ln 1</span>
    <span class="bb-sep">|</span>
    <span id="bb-status">Ready</span>
  </div>
</div>

<!-- LANG MODAL -->
<div class="modal-bg" id="modal-lang">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">เลือกภาษา</div>
    <div class="lang-list" id="lang-list"></div>
  </div>
</div>

<!-- NEW FILE MODAL -->
<div class="modal-bg" id="modal-nf">
  <div class="nf-sheet" onclick="event.stopPropagation()">
    <div class="nf-title">📄 ไฟล์ใหม่</div>
    <input class="nf-input" id="nf-name" type="text" placeholder="เช่น main.py" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="nf-btns">
      <button class="nf-btn cancel" onclick="closeNfModal()">ยกเลิก</button>
      <button class="nf-btn ok" onclick="confirmNewFile()">สร้าง</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" multiple accept=".js,.ts,.py,.cpp,.c,.java,.go,.rs,.php,.rb,.sh,.lua,.cs,.kt,.swift,.txt,.json,.md,.html,.css" onchange="handleFileOpen(event)">
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
const LANGS={
  javascript:{label:"⚡ JavaScript",short:"⚡ JS",piston:"javascript",ver:"18.15.0",monaco:"javascript",ext:".js",
    starter:"// JavaScript\nconsole.log(\"Hello, World!\");\n\nconst greet = name => `Hello, ${name}!`;\nconsole.log(greet(\"CodeLab\"));\n"},
  python:{label:"🐍 Python",short:"🐍 Py",piston:"python",ver:"3.10.0",monaco:"python",ext:".py",
    starter:"# Python\nprint(\"Hello, World!\")\n\ndef greet(name):\n    return f\"Hello, {name}!\"\n\nprint(greet(\"CodeLab\"))\n"},
  typescript:{label:"📘 TypeScript",short:"📘 TS",piston:"typescript",ver:"5.0.3",monaco:"typescript",ext:".ts",

  c:{label:"🔵 C",short:"🔵 C",piston:"c",ver:"10.2.0",monaco:"c",ext:".c",

  java:{label:"☕ Java",short:"☕ Java",piston:"java",ver:"15.0.2",monaco:"java",ext:".java",
    starter:"public class Main {\n    public static void main(String[] args) {\n        System.out.println(\"Hello, World!\");\n    }\n}\n"},
  go:{label:"🐹 Go",short:"🐹 Go",piston:"go",ver:"1.16.2",monaco:"go",ext:".go",

  ruby:{label:"💎 Ruby",short:"💎 Rb",piston:"ruby",ver:"3.0.1",monaco:"ruby",ext:".rb",

  bash:{label:"🐚 Bash",short:"🐚 Sh",piston:"bash",ver:"5.2.0",monaco:"shell",ext:".sh",

  lua:{label:"🌙 Lua",short:"🌙 Lua",piston:"lua",ver:"5.4.4",monaco:"lua",ext:".lua",

  csharp:{label:"💠 C#",short:"💠 C#",piston:"csharp",ver:"6.12.0",monaco:"csharp",ext:".cs",
    starter:"using System;\nclass Program{\n    static void Main(){\n        Console.WriteLine(\"Hello, World!\");\n    }\n}\n"},
  kotlin:{label:"🟣 Kotlin",short:"🟣 Kt",piston:"kotlin",ver:"1.8.20",monaco:"kotlin",ext:".kt",
    starter:"fun main(){\n    println(\"Hello, World!\")\n}\n"},
  swift:{label:"🍎 Swift",short:"🍎 Sw",piston:"swift",ver:"5.3.3",monaco:"swift",ext:".swift",
    starter:"import Foundation\nprint(\"Hello, World!\")\n"},
};

let editor=null,ready=false,activeFile=null,activeLang="javascript";
const files={},tabOrder=[];
let runCount=0,outputOpen=false,sidebarOpen=false;

require.config({paths:{vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs"}});
require(["vs/editor/editor.main"],()=>{
  monaco.editor.defineTheme("cl",{
    base:"vs-dark",inherit:true,
    rules:[
      {token:"comment",foreground:"5c6370",fontStyle:"italic"},
      {token:"keyword",foreground:"c678dd"},{token:"string",foreground:"98c379"},
      {token:"number",foreground:"d19a66"},{token:"function",foreground:"61afef"},
    ],
    colors:{
      "editor.background":"#0e0e16","editor.foreground":"#abb2bf",
      "editor.lineHighlightBackground":"#1a1a2e80",
      "editorLineNumber.foreground":"#3d3d5c",
      "editorLineNumber.activeForeground":"#5865f2",
      "editor.selectionBackground":"#5865f233",
      "editorCursor.foreground":"#5865f2",
      "editorBracketMatch.background":"#5865f222",
    }
  });
  const isMobile=window.innerWidth<=700;
  editor=monaco.editor.create(document.getElementById("monaco-container"),{
    value:"",language:"javascript",theme:"cl",
    fontSize:isMobile?13:14,fontFamily:'"' + 'JetBrains Mono",monospace',
    lineHeight:22,minimap:{enabled:!isMobile},
    scrollBeyondLastLine:false,wordWrap:"off",
    tabSize:2,insertSpaces:true,autoIndent:"full",
    formatOnPaste:true,suggestOnTriggerCharacters:true,
    quickSuggestions:{other:true,comments:true,strings:true},
    parameterHints:{enabled:true},snippetSuggestions:"top",
    renderLineHighlight:"gutter",smoothScrolling:true,
    cursorBlinking:"phase",cursorSmoothCaretAnimation:"on",
    bracketPairColorization:{enabled:true},
    guides:{bracketPairs:true,indentation:true},
    padding:{top:10},
    scrollbar:{verticalScrollbarSize:5,horizontalScrollbarSize:5},
  });
  ready=true;
  document.getElementById("editor-empty").style.display="none";
  editor.onDidChangeCursorPosition(e=>{
    document.getElementById("bb-cursor").textContent=`Ln ${e.position.lineNumber}`;
  });
  editor.onDidChangeModelContent(()=>{
    if(activeFile)files[activeFile].content=editor.getValue();
    renderTabs();renderTree();
  });
  editor.addCommand(monaco.KeyMod.CtrlCmd|monaco.KeyCode.Enter,runCode);
  editor.addCommand(monaco.KeyMod.CtrlCmd|monaco.KeyCode.KeyS,downloadActive);

  createFile("main.js","javascript",LANGS.javascript.starter);
  log("system","✦ CodeLab ready — Ctrl+Enter to run");
  log("info","🌐 Monaco Editor + Piston API (50+ languages)");
  buildLangList();

  if(!isMobile){outputOpen=true;document.getElementById("resize-handle").style.display="";}
  else{document.getElementById("output-panel").classList.remove("d-hidden");}
});
window.addEventListener("resize",()=>{editor?.layout();});

function guessLang(n){
  const e=n.split(".").pop().toLowerCase();
  const m={js:"javascript",ts:"typescript",py:"python",cpp:"cpp",c:"c",java:"java",
    go:"go",rs:"rust",php:"php",rb:"ruby",sh:"bash",lua:"lua",cs:"csharp",kt:"kotlin",swift:"swift",
    json:"json",md:"markdown",html:"html",css:"css"};
  return m[e]||"plaintext";
}
function getIcon(n){
  const e=n.split(".").pop();
  const m={js:"⚡",ts:"📘",py:"🐍",cpp:"⚙️",c:"🔵",java:"☕",go:"🐹",rs:"🦀",
    php:"🐘",rb:"💎",sh:"🐚",lua:"🌙",cs:"💠",kt:"🟣",swift:"🍎",
    json:"{}",md:"📝",txt:"📄",html:"🌐",css:"🎨"};
  return m[e]||"📄";
}

function createFile(name,lang,content=""){
  if(files[name]){switchTab(name);return;}
  files[name]={content,language:lang||guessLang(name)};
  tabOrder.push(name);
  renderTabs();renderTree();switchTab(name);
  if(LANGS[lang])setLang(lang,false);
}
function switchTab(name){
  if(!ready)return;
  if(activeFile)files[activeFile].content=editor.getValue();
  activeFile=name;
  const uri=monaco.Uri.parse(`file:///${name}`);
  let m=monaco.editor.getModel(uri);
  if(!m)m=monaco.editor.createModel(files[name].content,files[name].language,uri);
  editor.setModel(m);editor.focus();
  document.getElementById("bb-file").textContent=name;
  renderTabs();renderTree();
  const lk=Object.keys(LANGS).find(k=>LANGS[k].monaco===files[name].language)||files[name].language;
  setLang(lk,false);
  closeSidebar();
}
function closeTab(name,ev){
  ev.stopPropagation();
  const idx=tabOrder.indexOf(name);tabOrder.splice(idx,1);
  monaco.editor.getModel(monaco.Uri.parse(`file:///${name}`))?.dispose();
  delete files[name];
  if(activeFile===name){
    activeFile=tabOrder[Math.min(idx,tabOrder.length-1)]||null;
    if(activeFile)switchTab(activeFile);
    else{editor.setModel(null);document.getElementById("bb-file").textContent="No file";}
  }
  renderTabs();renderTree();
}

function renderTabs(){
  const c=document.getElementById("tabs");c.innerHTML="";
  const a=document.createElement("button");
  a.className="tab-add";a.textContent="+";a.onclick=newFileModal;c.appendChild(a);
  for(const n of tabOrder){
    const t=document.createElement("button");
    t.className="tab"+(n===activeFile?" active":"");
    t.innerHTML=`<span>${n}</span><button class="tab-close">×</button>`;
    t.onclick=()=>switchTab(n);
    t.querySelector(".tab-close").onclick=e=>closeTab(n,e);
    c.appendChild(t);
  }
}
function renderTree(filter=""){
  const tree=document.getElementById("file-tree");
  tree.innerHTML="<div class='tree-lbl'>Open Files</div>";
  tabOrder.filter(n=>!filter||n.toLowerCase().includes(filter.toLowerCase())).forEach(name=>{
    const b=document.createElement("button");
    b.className="tree-item"+(name===activeFile?" active":"");
    b.innerHTML=`<span class="item-icon">${getIcon(name)}</span><span class="iname">${name}</span>`;
    b.onclick=()=>switchTab(name);tree.appendChild(b);
  });
}
function filterTree(v){renderTree(v);}

function setLang(key,updateModel=true){
  if(!LANGS[key])return;
  activeLang=key;
  document.getElementById("lang-label").textContent=LANGS[key].short;
  document.getElementById("bb-lang").textContent=LANGS[key].label;
  if(updateModel&&ready&&editor.getModel()){
    monaco.editor.setModelLanguage(editor.getModel(),LANGS[key].monaco);
    if(activeFile)files[activeFile].language=LANGS[key].monaco;
  }
}
function buildLangList(){
  const list=document.getElementById("lang-list");list.innerHTML="";
  for(const[key,cfg]of Object.entries(LANGS)){
    const b=document.createElement("button");
    b.className="lang-item"+(key===activeLang?" selected":"");
    b.dataset.key=key;
    b.innerHTML=`<span>${cfg.label}</span><span class="lv">${cfg.ver}</span>${key===activeLang?"<span class='ck'>✓</span>":""}`;
    b.onclick=()=>{
      setLang(key,true);
      document.querySelectorAll(".lang-item").forEach(el=>{
        el.classList.toggle("selected",el.dataset.key===key);
        el.querySelector(".ck")?.remove();
        if(el.dataset.key===key)el.innerHTML+=`<span class="ck">✓</span>`;
      });
      closeLangModal();
    };
    list.appendChild(b);
  }
}
function openLangModal(){document.getElementById("modal-lang").classList.add("open");}
function closeLangModal(){document.getElementById("modal-lang").classList.remove("open");}
document.getElementById("modal-lang").addEventListener("click",e=>{if(e.target===document.getElementById("modal-lang"))closeLangModal();});

async function runCode(){
  if(!activeFile||!ready){showToast("⚠️ ไม่มีไฟล์");return;}
  const cfg=LANGS[activeLang];if(!cfg){showToast("❌ ไม่รองรับ");return;}
  const code=editor.getValue();
  const stdin=document.getElementById("stdin-input").value;
  const argsRaw=document.getElementById("args-input").value.trim();
  const args=argsRaw?argsRaw.split(/\s+/):[];
  const btn=document.getElementById("btn-run");
  btn.classList.add("running");
  btn.innerHTML='<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="4" height="10"/><rect x="9" y="3" width="4" height="10"/></svg> Stop';
  document.getElementById("bb-status").textContent="⏳ Running...";
  if(window.innerWidth<=700&&!outputOpen)toggleOutput();
  runCount++;
  const ts=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  log("system",`▶ Run #${runCount} — ${activeLang} — ${ts}`);
  const t0=performance.now();
  try{
    const res=await fetch("https://emkc.org/api/v2/piston/execute",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({language:cfg.piston,version:cfg.ver,
        files:[{name:activeFile,content:code}],stdin,args,run_timeout:10000,compile_timeout:15000}),
    });
    const elapsed=((performance.now()-t0)/1000).toFixed(2);
    if(!res.ok)throw new Error(`API error ${res.status}`);
    const data=await res.json();
    if(data.compile?.output?.trim())log("warn",`[Compile]\n${data.compile.output.trim()}`);
    const run=data.run||{};
    if(run.stdout)run.stdout.split("\n").forEach(l=>l&&log("stdout",l));
    if(run.stderr)run.stderr.split("\n").forEach(l=>l&&log("stderr",l));
    if(!run.stdout&&!run.stderr)log("info","(no output)");
    const exit=run.code??0;
    log(exit===0?"success":"stderr",exit===0?`✓ Exit 0 — ${elapsed}s`:`✗ Exit ${exit} — ${elapsed}s`);
    document.getElementById("bb-status").textContent=exit===0?`✓ ${elapsed}s`:`✗ ${elapsed}s`;
  }catch(err){
    log("stderr",`❌ ${err.message}`);
    log("info","💡 ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
    document.getElementById("bb-status").textContent="✗ Failed";
  }
  btn.classList.remove("running");
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6V2z"/></svg> Run';
  setTimeout(()=>{document.getElementById("bb-status").textContent="Ready";},4000);
}

function log(type,msg){
  const wrap=document.getElementById("output-scroll");
  const line=document.createElement("div");line.className="log-line";
  const t=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  line.innerHTML=`<span class="log-time">${t}</span><span class="log-msg log-${type}">${esc(msg)}</span>`;
  wrap.appendChild(line);wrap.scrollTop=wrap.scrollHeight;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function clearLog(){document.getElementById("output-scroll").innerHTML="";}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById("sidebar").classList.toggle("open",sidebarOpen);
  document.getElementById("sidebar-overlay").classList.toggle("open",sidebarOpen);
}
function closeSidebar(){
  sidebarOpen=false;
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("open");
}
function toggleOutput(){
  outputOpen=!outputOpen;
  const p=document.getElementById("output-panel");
  if(window.innerWidth<=700){
    p.classList.toggle("m-open",outputOpen);
  }else{
    p.classList.toggle("d-hidden",!outputOpen);
    document.getElementById("resize-handle").style.display=outputOpen?"":"none";
  }
  editor?.layout();
}
function switchOpTab(btn,tab){
  document.querySelectorAll(".op-tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("output-scroll").style.display=tab==="output"?"":"none";
  document.getElementById("stdin-section").classList.toggle("active",tab==="stdin");
  document.getElementById("args-section").classList.toggle("active",tab==="args");
}

function newFileModal(){
  document.getElementById("modal-nf").classList.add("open");
  setTimeout(()=>document.getElementById("nf-name").focus(),80);
}
function closeNfModal(){document.getElementById("modal-nf").classList.remove("open");}
document.getElementById("modal-nf").addEventListener("click",e=>{if(e.target===document.getElementById("modal-nf"))closeNfModal();});
document.getElementById("nf-name").addEventListener("keydown",e=>{
  if(e.key==="Enter")confirmNewFile();if(e.key==="Escape")closeNfModal();
});
function confirmNewFile(){
  let name=document.getElementById("nf-name").value.trim();if(!name)return;
  const lang=guessLang(name);
  if(!name.includes("."))name+=(LANGS[activeLang]?.ext||".txt");
  document.getElementById("nf-name").value="";closeNfModal();
  createFile(name,lang,LANGS[lang]?.starter||"");
  log("info",`✦ New: ${name}`);
}

function handleFileOpen(e){
  for(const file of e.target.files){
    const r=new FileReader();
    r.onload=ev=>{createFile(file.name,guessLang(file.name),ev.target.result);log("info",`📂 Opened: ${file.name}`);};
    r.readAsText(file);
  }
  e.target.value="";
}
function downloadActive(){
  if(!activeFile||!ready){showToast("⚠️ ไม่มีไฟล์");return;}
  const blob=new Blob([editor.getValue()],{type:"text/plain"});
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:activeFile});
  a.click();URL.revokeObjectURL(a.href);showToast(`⬇ ${activeFile}`);
}

let isResizing=false;
function startResize(e){
  isResizing=true;document.getElementById("resize-handle").classList.add("dragging");
  document.addEventListener("mousemove",doResize);document.addEventListener("mouseup",stopResize);
}
function doResize(e){
  if(!isResizing)return;
  const rect=document.getElementById("app").getBoundingClientRect();
  const w=Math.max(180,Math.min(600,rect.right-e.clientX));
  document.getElementById("output-panel").style.width=w+"px";editor?.layout();
}
function stopResize(){
  isResizing=false;document.getElementById("resize-handle").classList.remove("dragging");
  document.removeEventListener("mousemove",doResize);document.removeEventListener("mouseup",stopResize);
}

let dragStart=0,dragH=0;
const dh=document.getElementById("drawer-handle");
dh.addEventListener("touchstart",e=>{dragStart=e.touches[0].clientY;dragH=document.getElementById("output-panel").offsetHeight;},{passive:true});
dh.addEventListener("touchmove",e=>{
  const dy=dragStart-e.touches[0].clientY;
  const h=Math.max(40,Math.min(window.innerHeight*.7,dragH+dy));
  document.getElementById("output-panel").style.height=h+"px";
  if(h>40)outputOpen=true;
},{passive:true});
dh.addEventListener("touchend",()=>{
  if(document.getElementById("output-panel").offsetHeight<80){
    document.getElementById("output-panel").style.height="0";outputOpen=false;
  }
});

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}
</script>
</body>
